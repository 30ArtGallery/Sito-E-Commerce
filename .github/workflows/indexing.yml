name: Google Indexing

on:
  push:
    branches:
      - main  # <--- Scrivi 'master' se il tuo branch si chiama così

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Send URLs to Google
        uses: dgeibi/google-indexing-api-action@v1
        with:
          key: ${{ secrets.INDEXING_SERVICE_ACCOUNT_JSON }}
          sitemap_url: 'https://www.moodhaus.it/sitemap.xml'
