name: Google Indexing

on:
  push:
    branches: [ main ] 

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'


      - name: Install dependencies
        run: pip install google-auth requests

      - name: Run Indexing Script
        env:
          GOOGLE_JSON_KEY: ${{ secrets.INDEXING_SERVICE_ACCOUNT_JSON }}
          SITEMAP_URL: 'https://www.moodhaus.it/sitemap.xml'
        run: |
          import os
          import json
          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          import xml.etree.ElementTree as ET

          key_dict = json.loads(os.environ['GOOGLE_JSON_KEY'])
          sitemap_url = os.environ['SITEMAP_URL']
          
          scopes = ['https://www.googleapis.com/auth/indexing']
          creds = service_account.Credentials.from_service_account_info(key_dict, scopes=scopes)
          creds.refresh(Request())
          token = creds.token

          r = requests.get(sitemap_url)
          root = ET.fromstring(r.content)
          ns = {'ns': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          urls = [loc.text for loc in root.findall('.//ns:loc', ns)]

          endpoint = "https://indexing.googleapis.com/v3/urlNotifications:publish"
          headers = {'Content-Type': 'application/json', 'Authorization': f'Bearer {token}'}

          for url in urls[:200]: 
              data = json.dumps({"url": url, "type": "URL_UPDATED"})
              response = requests.post(endpoint, data=data, headers=headers)
              print(f"Inviato: {url} - Stato: {response.status_code}")
        shell: python
