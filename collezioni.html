<style>
  .collections-main { 
  padding: 60px 0; 
}

.collections-header { 
  text-align: center; 
  margin-bottom: 60px; 
}

.collections-header h1 { 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 1.1rem;      /* Piccolo ed elegante come i "Dettagli" */
  font-weight: 700;       /* Grassetto deciso */
  letter-spacing: 2px;    /* Molto spaziato per un look luxury */
  text-transform: uppercase; /* Tutto maiuscolo come il footer */
  color: #333;
}

  
  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; /* Due grandi box affiancati */
    gap: 30px;
  }

  .category-card {
    position: relative;
    height: 450px;
    overflow: hidden;
    background-color: var(--sand-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: white;
  }

  .category-card img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.8s ease;
    filter: brightness(0.8); /* Scurisce l'immagine per far leggere il testo */
  }

  .category-card:hover img { transform: scale(1.05); filter: brightness(0.6); }

  .category-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .category-content h2 {
    font-family: "Times New Roman", serif;
    font-size: 2rem;
    text-transform: lowercase;
    margin-bottom: 15px;
  }

  .btn-discover {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: 1px solid white;
    padding: 10px 20px;
    display: inline-block;
    transition: all 0.3s;
  }

  .category-card:hover .btn-discover { background: white; color: black; }

  @media (max-width: 768px) {
    .category-grid { grid-template-columns: 1fr; }
    .category-card { height: 350px; }
  }
</style>

<main class="container collections-main">
  <div class="collections-header">

  </div>

      </div>
    </a>

      </div>
    </a>

  </div>
</main>
