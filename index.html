<!DOCTYPE html>
<html lang="it-IT">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
    <link rel="canonical" href="https://www.moodhaus.it"/>
    
    <!-- SEO TITLES & DESCRIPTION -->
    <title>Moodhaus® | Stampe su Tela e Quadri Moderni d'Autore | Made in Italy</title>
    <meta name="description" content="Moodhaus è la tua galleria online per stampe su tela di alta qualità. Scopri i nostri quadri moderni, astratti e minimalisti. Trasforma il tuo arredo con eleganza artigianale."/>
    <meta name="keywords" content="stampe su tela, quadri moderni, quadri per arredamento, stampe canvas, quadri astratti, design interni, quadri bauhaus, moodhaus"/>
    <meta name="robots" content="index, follow, max-image-preview:large"/>
    
    <!-- OPEN GRAPH -->
    <meta property="og:locale" content="it_IT"/>
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="Moodhaus® | Stampe su Tela e Quadri Moderni"/>
    <meta property="og:description" content="L'eccellenza delle stampe su tela per un arredamento unico e moderno. Scopri la collezione."/>
    <meta property="og:url" content="https://www.moodhaus.it"/>
    <meta property="og:site_name" content="Moodhaus"/>
    <meta property="og:image" content="https://www.moodhaus.it"/>

    <!-- SCHEMA.ORG MARKUP JSON-LD -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Moodhaus",
        "url": "https://www.moodhaus.it",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.moodhaus.itsearch?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Moodhaus",
        "url": "https://www.moodhaus.it",
        "logo": "https://www.moodhaus.itwp-content/uploads/logo-moodhaus.png"
      }
    ]
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --sand-bg: #fdfcf9;
            --sand-soft: #f4f1ea;
            --text-main: #2c2c2c;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background: var(--white); -webkit-font-smoothing: antialiased; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        a { text-decoration: none; color: inherit; }

        header { padding: 30px 0; background: white; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 500; letter-spacing: -1px; margin-bottom: 20px; display: block; }
        
        .main-nav { display: flex; justify-content: center; gap: 35px; }
        .main-nav a { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #555; }

        .hero-mockup-main { width: 100%; height: auto; background-color: var(--sand-bg); overflow: hidden; }
        .hero-mockup-main img { width: 100%; height: auto; display: block; }

        .mockup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; background: var(--white); }
        .mockup-box { aspect-ratio: auto; overflow: hidden; background: var(--sand-soft); }
        .mockup-box img { width: 100%; height: auto; display: block; transition: transform 1s ease; }
        .mockup-box:hover img { transform: scale(1.05); }

        /* REGOLE FISSE PER 4 COLONNE BEST SELLER */
        .product-row {
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
            gap: 25px;
            margin-top: 40px;
        }
        .product-item { text-align: center; display: block; text-decoration: none; }
        .product-img-box { background-color: var(--sand-bg); margin-bottom: 15px; overflow: hidden; }
        
        /* BLOCCA LE IMMAGINI GRANDI */
        .product-img-box img { 
            width: 100% !important; 
            max-width: 100% !important; 
            height: auto !important; 
            display: block; 
            transition: opacity 0.4s ease;
        }
        .product-item:hover img { opacity: 0.8; }
        .product-item h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 5px; }
        .product-item p { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #999; }

        footer { padding: 60px 0; text-align: center; border-top: 1px solid var(--sand-soft); margin-top: 40px; }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 10px; display: block; }
        .copy { font-size: 0.6rem; letter-spacing: 2px; color: #999; text-transform: uppercase; }

        @media (max-width: 768px) {
            .mockup-grid { grid-template-columns: 1fr; }
            .product-row { grid-template-columns: 1fr 1fr !important; }
            .main-nav { gap: 15px; font-size: 0.6rem; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo"><a href="index.html">moodhaus</a></h1>
            <nav class="main-nav">
                <a href="#">Collezioni</a>
                <a href="#">Stampe su Tela</a>
                <a href="#">Materiali</a>
                <a href="#">Contatti</a>
            </nav>
        </div>
    </header>

    <section class="hero-mockup-main">
        <img src="https://www.moodhaus.it" alt="Collezione Moodhaus stampe su tela">
    </section>

    <section class="mockup-grid">
        <div class="mockup-box">
            <img src="https://www.moodhaus.itwp-content/uploads/2026/02/Quadri-moderni-Bauhaus-per-arredamento-moderno-768x1024.jpg" alt="Quadro Bauhaus">
        </div>
        <div class="mockup-box">
            <img src="https://www.moodhaus.itwp-content/uploads/2026/02/Stampe-moderne-su-tela-canvas-colorate-astratte-e-geometriche-768x1024.jpg" alt="Stampa Geometrica">
        </div>
    </section>

    <!-- SEZIONE PRODOTTI BESTSELLER -->
    <section class="container" style="margin-top: 60px; margin-bottom: 80px;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 400; letter-spacing: 1px;">I più amati di Moodhaus</h2>
            <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #999; margin-top: 10px;">Stampe su tela d'autore</p>
        </div>

        <div class="product-row">
            <!-- Prodotto 1 -->
            <a href="prodotti/bauhaus-1.html" class="product-item">
                <div class="product-img-box">
                    <img src="https://www.moodhaus.itwp-content/uploads/2024/09/Bauhaus-0749.webp" alt="Bauhaus 01">
                </div>
                <h3>Bauhaus No. 01</h3>
                <p>Collezione Astratta</p>
            </a>

            <!-- Prodotto 2 -->
            <a href="#" class="product-item">
                <div class="product-img-box">
                    <img src="https://www.moodhaus.itwp-content/uploads/2024/09/Bauhaus-0255.webp" alt="Minimal 02">
                </div>
                <h3>Geometrie Soft</h3>
                <p>Serie Minimalista</p>
            </a>

            <!-- Prodotto 3 -->
            <a href="#" class="product-item">
                <div class="product-img-box">
                    <img src="https://www.moodhaus.itwp-content/uploads/2024/09/Bauhaus-0518.webp" alt="Artistica 03">
                </div>
                <h3>Equilibrio Cromatico</h3>
                <p>Fine Art Canvas</p>
            </a>

            <!-- Prodotto 4 -->
            <a href="#" class="product-item">
                <div class="product-img-box">
                    <img src="https://www.moodhaus.itwp-content/uploads/2024/09/Bauhaus-0329.webp" alt="Contemporanea 04">
                </div>
                <h3>Orizzonte Astratto</h3>
                <p>Collezione 2026</p>
            </a>
        </div>
    </section>

    <footer>
        <div class="container">
            <span class="footer-logo">moodhaus</span>
            <p class="copy">&copy; 2026 Studio Moodhaus — Italia</p>
        </div>
    </footer>

</body>
</html>
