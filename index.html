<!DOCTYPE html>
<html lang="it-IT">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Moodhaus | Stampe su Tela d'Autore</title>
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --sand-bg: #fdfcf9;
            --sand-soft: #f4f1ea;
            --text-main: #2c2c2c;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background: var(--white); -webkit-font-smoothing: antialiased; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        a { text-decoration: none; color: inherit; }

        /* HEADER & MENU */
        header { padding: 30px 0; background: white; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 500; letter-spacing: -1px; margin-bottom: 20px; display: block; }
        
        .main-nav { display: flex; justify-content: center; gap: 35px; }
        .main-nav a { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #555; }

        /* MOCKUP PRINCIPALE (LARGO) */
        .hero-mockup-main {
            width: 100%;
            height: 70vh; /* Altezza grande */
            background-color: var(--sand-bg);
            overflow: hidden;
        }
        .hero-mockup-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* SEZIONE DUE FOTO AFFIANCATE */
        .mockup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Due colonne uguali */
            gap: 20px;
            padding: 20px;
            background: var(--white);
        }
        .mockup-box {
            aspect-ratio: 16 / 9; /* Formato orizzontale morbido */
            overflow: hidden;
            background: var(--sand-soft);
        }
        .mockup-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s ease;
        }
        .mockup-box:hover img {
            transform: scale(1.05);
        }

        /* FOOTER MINIMALE */
        footer { padding: 60px 0; text-align: center; border-top: 1px solid var(--sand-soft); margin-top: 40px; }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 10px; display: block; }
        .copy { font-size: 0.6rem; letter-spacing: 2px; color: #999; text-transform: uppercase; }

        /* MOBILE */
        @media (max-width: 768px) {
            .mockup-grid { grid-template-columns: 1fr; } /* Una sopra l'altra su mobile */
            .hero-mockup-main { height: 40vh; }
            .main-nav { gap: 15px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="index.html" class="logo">moodhaus</a>
            <nav class="main-nav">
                <a href="#">Collezioni</a>
                <a href="#">Stampe</a>
                <a href="#">Materiali</a>
                <a href="#">Contatti</a>
            </nav>
        </div>
    </header>

    <!-- 1. MOCKUP PRINCIPALE LARGO -->
    <section class="hero-mockup-main">
        <img src="LINK_MOCKUP_PRINCIPALE.jpg" alt="Moodhaus Main Interior">
    </section>

    <!-- 2. DUE FOTO AFFIANCATE -->
    <section class="mockup-grid">
        <div class="mockup-box">
            <img src="LINK_FOTO_SINISTRA.jpg" alt="Dettaglio Stampa 1">
        </div>
        <div class="mockup-box">
            <img src="LINK_FOTO_DESTRA.jpg" alt="Dettaglio Stampa 2">
        </div>
    </section>

    <footer>
        <div class="container">
            <span class="footer-logo">moodhaus</span>
            <p class="copy">&copy; 2026 Studio Moodhaus — Italia</p>
        </div>
    </footer>

</body>
</html>
