<!DOCTYPE html>
<html lang="it-IT">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
    <link rel="canonical" href="https://30artgallery.github.io"/>
    
    <!-- SEO TITLES & DESCRIPTION (Livello Advanced) -->
    <title>Moodhaus® | Stampe su Tela e Quadri Moderni d'Autore | Made in Italy</title>
    <meta name="description" content="Moodhaus è la tua galleria online per stampe su tela di alta qualità. Scopri i nostri quadri moderni, astratti e minimalisti. Trasforma il tuo arredo con eleganza artigianale."/>
    <meta name="keywords" content="stampe su tela, quadri moderni, quadri per arredamento, stampe canvas, quadri astratti, design interni, quadri bauhaus, moodhaus"/>
    <meta name="robots" content="index, follow, max-image-preview:large"/>
    
    <!-- OPEN GRAPH (Potenza Social) -->
    <meta property="og:locale" content="it_IT"/>
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="Moodhaus® | Stampe su Tela e Quadri Moderni"/>
    <meta property="og:description" content="L'eccellenza delle stampe su tela per un arredamento unico e moderno. Scopri la collezione."/>
    <meta property="og:url" content="https://30artgallery.github.io"/>
    <meta property="og:site_name" content="Moodhaus"/>
    <meta property="og:image" content="https://www.moodhaus.it"/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="Moodhaus | Quadri Moderni su Tela"/>
    
    <!-- SCHEMA.ORG MARKUP JSON-LD (Potenza Semantica) -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Moodhaus",
        "url": "https://30artgallery.github.io",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://30artgallery.github.iosearch?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Moodhaus",
        "url": "https://30artgallery.github.io",
        "logo": "https://www.moodhaus.it",
        "sameAs": [
          "https://www.facebook.com",
          "https://www.instagram.com"
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Stampe Bauhaus",
            "url": "https://30artgallery.github.iocollezioni/bauhaus"
          }
        ]
      }
    ]
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --sand-bg: #fdfcf9;
            --sand-soft: #f4f1ea;
            --text-main: #2c2c2c;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-main); background: var(--white); -webkit-font-smoothing: antialiased; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 30px; }
        a { text-decoration: none; color: inherit; }

        header { padding: 30px 0; background: white; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 500; letter-spacing: -1px; margin-bottom: 20px; display: block; }
        
        .main-nav { display: flex; justify-content: center; gap: 35px; }
        .main-nav a { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #555; }

        .hero-mockup-main { width: 100%; height: auto; background-color: var(--sand-bg); overflow: hidden; }
        .hero-mockup-main img { width: 100%; height: auto; display: block; }

        .mockup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; background: var(--white); }
        .mockup-box { aspect-ratio: auto; overflow: hidden; background: var(--sand-soft); }
        .mockup-box img { width: 100%; height: auto; display: block; transition: transform 1s ease; }
        .mockup-box:hover img { transform: scale(1.05); }

        footer { padding: 60px 0; text-align: center; border-top: 1px solid var(--sand-soft); margin-top: 40px; }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 10px; display: block; }
        .copy { font-size: 0.6rem; letter-spacing: 2px; color: #999; text-transform: uppercase; }

        @media (max-width: 768px) {
            .mockup-grid { grid-template-columns: 1fr; }
            .main-nav { gap: 15px; font-size: 0.6rem; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo"><a href="index.html">moodhaus</a></h1>
            <nav class="main-nav">
                <a href="#">Collezioni</a>
                <a href="#">Stampe su Tela</a>
                <a href="#">Materiali</a>
                <a href="#">Contatti</a>
            </nav>
        </div>
    </header>

    <section class="hero-mockup-main">
        <img src="https://www.moodhaus.it" alt="Collezione Moodhaus stampe su tela moderne in stile Bauhaus per arredamento d'interni">
    </section>

    <section class="mockup-grid">
        <div class="mockup-box">
            <img src="https://www.moodhaus.it" alt="Quadro moderno Moodhaus su tela posizionato sopra un divano moderno">
        </div>
        <div class="mockup-box">
            <img src="https://www.moodhaus.it" alt="Dettaglio stampe su tela canvas con forme geometriche e colori pastello">
        </div>
    </section>

    <footer>
        <div class="container">
            <span class="footer-logo">moodhaus</span>
            <p class="copy">&copy; 2026 Studio Moodhaus — Eccellenza nelle stampe su tela</p>
        </div>
    </footer>

</body>
</html>
