<!DOCTYPE html>
<html lang="it-IT" translate="no">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
    
    <!-- SEO CATEGORIA SPECIFICO -->
    <title>Quadri Astratti Moderni - Stampe su Tela d'Autore | 30ArtGallery</title>
    <meta name="description" content="Esplora la collezione di quadri astratti 30ArtGallery. Stampe su tela di alta qualità e design artigianale per un arredamento raffinato."/>
    
    <!-- Importiamo lo stesso font della Home -->
    <link rel="stylesheet" href="https://fonts.googleapis.com">

    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --sabbia: #f2eee9;
            --border: #eeeeee;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }

        /* HEADER IDENTICO ALLA HOME */
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); sticky; top: 0; background: white; z-index: 1000; }
        .logo { font-size: 1.1rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; color: var(--text); }

        /* TITOLO CATEGORIA */
        .category-hero { padding: 60px 40px; background: var(--sabbia); text-align: center; }
        .category-hero h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .category-hero p { font-size: 0.9rem; color: #555; max-width: 600px; margin: 0 auto; }

        /* GRIGLIA PRODOTTI */
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; }
        .product-card { text-decoration: none; color: var(--text); }
        .product-img { aspect-ratio: 3/4; background: var(--sabbia); overflow: hidden; margin-bottom: 15px; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
        .product-name { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .product-price { font-size: 0.9rem; color: #666; }

        /* FOOTER IDENTICO ALLA HOME */
        footer { padding: 60px 40px; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; color: #888; letter-spacing: 1px; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo">30ArtGallery</a>
        <div style="font-size: 0.8rem; letter-spacing: 1px;">EST. 2026</div>
    </header>

    <section class="category-hero">
        <h1>Quadri Astratti</h1>
        <p>L'essenzialità delle forme incontra la profondità del colore. Una selezione curata per ambienti dal carattere deciso.</p>
    </section>

    <main class="product-grid">
        <!-- Esempio Prodotto 1 -->
        <a href="../prodotti/prodotto-template.html" class="product-card">
            <div class="product-img">
                <img src="https://images.unsplash.com" alt="Quadro Astratto 1">
            </div>
            <div class="product-name">Orizzonti Blu</div>
            <div class="product-price">€ 89,00</div>
        </a>

        <!-- Esempio Prodotto 2 -->
        <a href="#" class="product-card">
            <div class="product-img">
                <img src="https://images.unsplash.com" alt="Quadro Astratto 2">
            </div>
            <div class="product-name">Sabbia Dorata</div>
            <div class="product-price">€ 95,00</div>
        </a>

        <!-- Esempio Prodotto 3 -->
        <a href="#" class="product-card">
            <div class="product-img">
                <img src="https://images.unsplash.com" alt="Quadro Astratto 3">
            </div>
            <div class="product-name">Minimal Gray</div>
            <div class="product-price">€ 79,00</div>
        </a>
    </main>

    <footer>
        &copy; 2026 30ARTGALLERY - VENDITA ONLINE QUADRI E STAMPE - MADE IN ITALY
    </footer>

</body>
</html>
