---
layout: default
---
<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }}</title> <!-- SEO Statica -->
    <meta name="description" content="{{ page.descrizione }}">
</head>
<body>
    <h1>{{ page.title }}</h1>
    <img src="{{ page.immagine }}" alt="{{ page.title }}">
    <p>Prezzo: {{ page.prezzo }}</p>
    <div class="descrizione">
        {{ content }} <!-- Qui finirà il testo descrittivo -->
    </div>
</body>
</html>
