<main class="container">
  <div id="gallery" class="product-grid">
    <!-- I prodotti verranno caricati qui automaticamente -->
  </div>
</main>

<script>
async function caricaGalleria() {
    const gallery = document.getElementById('gallery');
    
    try {
        const response = await fetch('prodotti.json');
        const prodotti = await response.json();

        gallery.innerHTML = prodotti.map(p => `
            <a href="prodotto.html?id=${p.id}" class="product-card">
                <img src="${p.immagine}" alt="${p.titolo}">
                <h3>${p.titolo}</h3>
                <p>€ ${p.prezzo}</p>
            </a>
        `).join('');

    } catch (error) {
        console.error("Errore caricamento prodotti:", error);
        gallery.innerHTML = "<p>Caricamento prodotti fallito.</p>";
    }
}

// Esegue la funzione all'avvio
window.onload = caricaGalleria;
</script>
