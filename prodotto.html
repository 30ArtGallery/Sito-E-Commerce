<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');

  // Carica i dati dal file prodotti.json
  fetch('prodotti.json')
    .then(res => {
      if (!res.ok) throw new Error("Errore nel caricamento del file JSON");
      return res.json();
    })
    .then(data => {
      const p = data.find(item => item.id === productId);
      
      if (p) {
        // Popolamento testi
        document.getElementById('p-titolo').innerText = p.titolo;
        document.getElementById('p-prezzo').innerText = "€ " + p.prezzo;
        document.getElementById('p-misura').innerText = p.misura;
        document.getElementById('p-telaio').innerText = p.telaio;
        document.getElementById('p-descrizione').innerHTML = p.descrizione;

        // Gestione Immagine
        const imgElement = document.getElementById('p-img');
        imgElement.src = p.immagine;
        imgElement.alt = p.titolo;

        // SEO dinamica
        document.title = p.seo_title || (p.titolo + " | Moodhaus®");
        document.getElementById('p-meta-desc').content = p.seo_desc || "";
        document.getElementById('p-canonical').href = window.location.href;

        // Schema.org per Google
        const schema = {
          "@context": "https://schema.org",
          "@type": "Product",
          "name": p.titolo,
          "image": window.location.origin + "/" + p.immagine, 
          "description": p.seo_desc,
          "offers": {
            "@type": "Offer",
            "price": p.prezzo.replace(',', '.'),
            "priceCurrency": "EUR",
            "availability": "https://schema.org"
          }
        };
        
        // Se l'immagine è già un URL completo (come il tuo id minimal-05), usa quello direttamente per lo schema
        if (p.immagine.startsWith('http')) {
          schema.image = p.immagine;
        }

        const scriptSchema = document.createElement('script');
        scriptSchema.type = 'application/ld+json';
        scriptSchema.text = JSON.stringify(schema);
        document.head.appendChild(scriptSchema);

      } else {
        // Se l'ID non esiste o non è passato
        document.getElementById('p-titolo').innerText = "Prodotto non trovato";
        document.getElementById('p-prezzo').style.display = "none";
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById('p-titolo').innerText = "Errore di caricamento";
    });
</script>
