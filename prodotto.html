  <header>
    <div class="container">

      <h1 class="logo"><a href="index.html">moodhaus</a></h1>

<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');

  fetch('prodotti.json')
    .then(res => res.json())
    .then(data => {
      const p = data.find(item => item.id === productId);
      if (!p) {
        document.body.innerHTML = "<h1 style='text-align:center; padding-top:100px;'>Opera non trovata</h1>";
        return;
      }

      // --- 1. INIEZIONE DATI VISIBILI ---
      document.getElementById('p-titolo').innerText = p.titolo;
      document.getElementById('p-prezzo').innerText = "€ " + p.prezzo;
      document.getElementById('p-img').src = p.immagine;
      document.getElementById('p-img').alt = p.titolo;
      document.getElementById('p-descrizione').innerHTML = p.descrizione;
      document.getElementById('p-misura').innerText = p.misura || "90 x 60 cm";
      document.getElementById('p-telaio').innerText = p.telaio || "Galleria h 3 cm";

      // --- 2. SEO & SOCIAL POWER (Meta Tag Dinamici) ---
      const siteName = "Moodhaus®";
      const fullUrl = window.location.href;
      document.title = `${p.titolo} - Stampe su Tela | ${siteName}`;
      
      // Update Meta Tags (SEO & Social)
      const updateMeta = (name, content, attr='name') => {
        let el = document.querySelector(`meta[${attr}="${name}"]`);
        if (!el) {
          el = document.createElement('meta');
          el.setAttribute(attr, name);
          document.head.appendChild(el);
        }
        el.content = content;
      };

      updateMeta("description", p.seo_desc || p.titolo);
      updateMeta("og:title", p.titolo, 'property');
      updateMeta("og:description", p.seo_desc || p.titolo, 'property');
      updateMeta("og:image", p.immagine, 'property');
      updateMeta("og:url", fullUrl, 'property');
      updateMeta("twitter:card", "summary_large_image");

      // --- 3. SCHEMA.ORG JSON-LD (Potenza Google Shopping) ---
      const productSchema = {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": p.titolo,
        "image": [p.immagine],
        "description": p.seo_desc || p.titolo,
        "brand": { "@type": "Brand", "name": siteName },
        "sku": p.id,
        "offers": {
          "@type": "Offer",
          "url": fullUrl,
          "priceCurrency": "EUR",
          "price": p.prezzo.replace(',', '.'),
          "itemCondition": "https://schema.orgNewCondition",
          "availability": "https://schema.orgInStock",
          "hasMerchantReturnPolicy": {
            "@type": "MerchantReturnPolicy",
            "returnPolicyCategory": "https://schema.orgMerchantReturnFiniteReturnPeriod",
            "merchantReturnDays": 14,
            "returnMethod": "https://schema.orgReturnByMail",
            "returnFees": "https://schema.orgFreeReturn"
          }
        }
      };
      const scriptSchema = document.createElement('script');
      scriptSchema.type = 'application/ld+json';
      scriptSchema.text = JSON.stringify(productSchema);
      document.head.appendChild(scriptSchema);

      // --- 4. FUNZIONE CORRELATI (Smart Cross-Selling) ---
      // Se hai un div con id="correlati-box", questo script lo popola
      const correlatiBox = document.getElementById('correlati-box');
      if (correlatiBox) {
        const altri = data.filter(item => item.id !== productId).sort(() => 0.5 - Math.random()).slice(0, 3);
        altri.forEach(item => {
          correlatiBox.innerHTML += `
            <div style="flex:1; min-width:200px; text-align:center;">
              <a href="prodotto.html?id=${item.id}">
                <img src="${item.immagine}" style="width:100%; aspect-ratio:1; object-fit:cover; margin-bottom:10px;">
                <p style="font-family:'Times New Roman', serif; font-size:0.9rem;">${item.titolo}</p>
                <p style="font-size:0.8rem; font-weight:600;">€ ${item.prezzo}</p>
              </a>
            </div>`;
        });
      }
    })
    .catch(err => console.error("Errore Sistema Moodhaus:", err));
</script>
