<!DOCTYPE html>
<html lang="it-IT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caricamento prodotto... | Moodhaus</title>
  <meta name="description" content="" />
  
  <style>
    :root {
      --sand-bg: #fdfcf9;
      --sand-soft: #f4f1ea;
      --text-main: #2c2c2c;
      --white: #ffffff;
      --accent: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text-main);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    /* HEADER */
    header { padding: 30px 0; border-bottom: 1px solid #f0f0f0; text-align: center; }
    .logo { font-family: "Times New Roman", serif; font-size: 2.6rem; letter-spacing: -1px; margin-bottom: 20px; }
    .logo a { text-decoration: none; color: inherit; }
    .main-nav { display: flex; justify-content: center; gap: 35px; }
    .main-nav a { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); text-decoration: none; }

    /* SEZIONE PRODOTTO */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      margin: 60px 0;
      align-items: start;
    }

    #immagine-prodotto {
      width: 100%;
      height: auto;
      background-color: var(--sand-soft);
    }

    .product-info h1 { font-size: 2rem; margin-bottom: 15px; font-weight: 400; }
    .price { font-size: 1.5rem; margin-bottom: 30px; color: #000; }
    .details { margin-bottom: 30px; line-height: 1.6; color: #666; }
    .spec-list { list-style: none; border-top: 1px solid #eee; padding-top: 20px; }
    .spec-list li { font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

    /* FOOTER */
    footer { padding: 60px 0; text-align: center; border-top: 1px solid var(--sand-soft); margin-top: 40px; }
    .footer-logo { font-family: "Times New Roman", serif; font-size: 1.8rem; margin-bottom: 10px; display: block; }
    .copy { font-size: 0.6rem; letter-spacing: 2px; color: #999; text-transform: uppercase; }

    @media (max-width: 768px) {
      .product-grid { grid-template-columns: 1fr; gap: 30px; }
    }
  </style>
</head>

<body>

  <header>
    <div class="container">
      <h1 class="logo"><a href="index.html">moodhaus</a></h1>
      <nav class="main-nav">
        <a href="collezioni.html">Collezioni</a>
        <a href="stampe-su-tela.html">Stampe su tela</a>
        <a href="materiali.html">Materiali</a>
      </nav>
    </div>
  </header>

  <main class="container" id="contenitore-prodotto">
    <div class="product-grid">
      <!-- Immagine -->
      <div class="product-image">
        <img id="immagine-prodotto" src="" alt="Caricamento...">
      </div>

      <!-- Dati -->
      <div class="product-info">
        <h1 id="titolo-prodotto">Caricamento...</h1>
        <p class="price" id="prezzo-prodotto"></p>
        
        <div class="details">
          <p id="descrizione-prodotto"></p>
        </div>

        <ul class="spec-list">
          <li>Misura: <span id="misura-prodotto">-</span></li>
          <li>Telaio: <span id="telaio-prodotto">-</span></li>
        </ul>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <span class="footer-logo">moodhaus</span>
      <p class="copy">&copy; 2026 Studio Moodhaus — Eccellenza nelle stampe su tela</p>
    </div>
  </footer>

  <script>
  async function caricaProdotto() {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');

      if (!productId) {
          document.getElementById('contenitore-prodotto').innerHTML = "<h1>Prodotto non specificato</h1>";
          return;
      }

      try {
          const response = await fetch('prodotti.json');
          const prodotti = await response.json();
          const prodotto = prodotti.find(p => p.id === productId);

          if (prodotto) {
              // Aggiorna SEO
              document.title = prodotto.seo_title;
              const metaDesc = document.querySelector('meta[name="description"]');
              if(metaDesc) metaDesc.setAttribute("content", prodotto.seo_desc);
              
              // Inietta dati
              document.getElementById('titolo-prodotto').innerText = prodotto.titolo;
              document.getElementById('prezzo-prodotto').innerText = "€ " + prodotto.prezzo;
              document.getElementById('descrizione-prodotto').innerText = prodotto.descrizione;
              document.getElementById('immagine-prodotto').src = prodotto.immagine;
              document.getElementById('immagine-prodotto').alt = prodotto.titolo;
              document.getElementById('misura-prodotto').innerText = prodotto.misura;
              document.getElementById('telaio-prodotto').innerText = prodotto.telaio;
          } else {
              document.getElementById('contenitore-prodotto').innerHTML = "<h1>Prodotto non trovato nel catalogo</h1>";
          }
      } catch (error) {
          console.error("Errore nel caricamento:", error);
          document.getElementById('contenitore-prodotto').innerHTML = "<h1>Errore di caricamento dati</h1>";
      }
  }

  window.onload = caricaProdotto;
  </script>

</body>
</html>
