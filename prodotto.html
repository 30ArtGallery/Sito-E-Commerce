<!DOCTYPE html>
<html lang="it-IT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO dinamica gestita dallo script -->
  <title id="p-page-title">Moodhaus®</title>
  <meta id="p-meta-desc" name="description" content="">
  <link id="p-canonical" rel="canonical" href="">

  <style>
    :root {
      --sand-bg: #fdfcf9;
      --sand-soft: #f4f1ea;
      --text-main: #2c2c2c;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
    a { text-decoration: none; color: inherit; }

    header {
      padding: 30px 0;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      text-align: center;
    }

    .logo {
      font-family: "Times New Roman", Times, serif;
      font-size: 2.6rem;
      font-weight: 500;
      letter-spacing: -1px;
      margin-bottom: 20px;
      display: block;
    }

    .main-nav { display: flex; justify-content: center; gap: 35px; }
    .main-nav a { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #555; }

    footer {
      padding: 40px 0;
      text-align: center;
      border-top: 1px solid var(--sand-soft);
      margin-top: 40px;
    }

    .footer-logo {
      font-family: "Times New Roman", Times, serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
      display: block;
    }

    .copy {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #999;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .main-nav { gap: 15px; font-size: 0.6rem; flex-wrap: wrap; }
    }
  </style>
</head>

<body>

  <header>
    <div class="container">
      <h1 class="logo"><a href="index.html">moodhaus</a></h1>
      <nav class="main-nav">
        <a href="collezioni.html">Collezioni</a>
        <a href="stampe-su-tela.html">Stampe su tela</a>
        <a href="materiali.html">Materiali</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container" style="max-width: 1100px; padding: 80px 20px;">
      <div style="display: flex; flex-wrap: wrap; gap: 60px; align-items: flex-start; margin-bottom: 80px;">
        
        <!-- FOTO -->
        <div style="flex: 1.5; min-width: 350px;">
          <div style="background-color: #f9f9f9; line-height: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.03);">
            <img id="p-img" src="" alt="" style="width: 100%; height: auto; display: block;">
          </div>
        </div>

        <!-- DETTAGLI -->
        <div style="flex: 1; min-width: 300px; text-align: left;">
          <h1 id="p-titolo" style="font-family: 'Times New Roman', serif; font-size: 2.2rem; font-weight: 500; margin-bottom: 10px;">Caricamento...</h1>
          <p style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: #999; margin-bottom: 30px;">Stampa su tela intelaiata — Fine Art Edition</p>
          
          <div style="margin-bottom: 40px; padding: 25px 0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0;">
            <p id="p-prezzo" style="font-family: 'Times New Roman', serif; font-size: 1.8rem; color: #2c2c2c; margin-bottom: 20px;">€ --,--</p>
            <ul style="list-style: none; padding: 0;">
              <li style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 10px;"><strong>Misura:</strong> <span id="p-misura"></span></li>
              <li style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 10px;"><strong>Telaio:</strong> <span id="p-telaio"></span></li>
              <li style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 10px;"><strong>Spedizione:</strong> Gratuita</li>
              <li style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #27ae60;"><strong>Pagamento:</strong> Sicuro 100%</li>
            </ul>
          </div>
          <button style="width: 100%; background: #000; color: #fff; border: none; padding: 20px; text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; font-weight: 600; cursor: pointer;">Acquista Ora</button>
        </div>
      </div>

      <!-- DESCRIZIONE -->
      <div style="border-top: 1px solid #f0f0f0; padding-top: 60px;">
        <h2 style="font-family: 'Times New Roman', serif; font-size: 1.5rem; margin-bottom: 25px; text-align: center;">Dettagli Tecnici e Qualità</h2>
        <div id="p-descrizione" style="line-height: 2; color: #444; font-size: 1rem; margin: 0 auto; max-width: 900px; text-align: justify;"></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <span class="footer-logo">moodhaus</span>
      <p class="copy">&copy; 2026 Studio Moodhaus</p>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    fetch('prodotti.json')
      .then(res => res.json())
      .then(data => {
        const p = data.find(item => item.id === productId);
        if (p) {
          document.getElementById('p-titolo').innerText = p.titolo;
          document.getElementById('p-prezzo').innerText = "€ " + p.prezzo;
          document.getElementById('p-img').src = p.immagine;
          document.getElementById('p-descrizione').innerHTML = p.descrizione;
          document.getElementById('p-misura').innerText = p.misura;
          document.getElementById('p-telaio').innerText = p.telaio;
          
          // SEO DINAMICA
          document.title = p.seo_title || (p.titolo + " | Moodhaus®");
          document.getElementById('p-meta-desc').content = p.seo_desc || "";
          document.getElementById('p-canonical').href = window.location.href;

          // SCHEMA.ORG AUTOMATICO
          const schema = {
            "@context": "https://schema.org",
            "@type": "Product",
            "name": p.titolo,
            "image": p.immagine,
            "description": p.seo_desc,
            "offers": {
              "@type": "Offer",
              "price": p.prezzo.replace(',', '.'),
              "priceCurrency": "EUR",
              "availability": "https://schema.orgInStock"
            }
          };
          const script = document.createElement('script');
          script.type = 'application/ld+json';
          script.text = JSON.stringify(schema);
          document.head.appendChild(script);
        } else {
          document.getElementById('p-titolo').innerText = "Opera non trovata";
        }
      });
  </script>
</body>
</html>
